# 阿里云百炼配置（api_key 以系统设置 / 直播间合并配置为准，可选环境变量 DASHSCOPE_API_KEY 兜底）
dashscope:
  api_key: ""
  region: "cn-beijing"

# 文本大模型配置
llm:
  model_name: "qwen-plus-character"
  max_history: 5  # 短期记忆对话轮次
  temperature: 0.85
  stream: true
  cache_control:
    type: "ephemeral"  # 显式临时缓存

# TTS语音配置
tts:
  enabled: true
  model_name: "cosyvoice-v3.5-plus"
  voice_id: "cosyvoice-v3.5-plus-myvoice-4b8964a1dc9a4a07bd6babf1c5db8fe3"
  sample_rate: 16000
  format: "wav"
  speech_rate: 1.2
  pitch_rate: 1.0
  stream: true
  audio_mode: "pyaudio"  # websocket: 通过WebSocket推送到前端; pyaudio: 服务端直接播放

# 直播工程配置
live:
  max_cycle_focus: 3  # 前3次循环纳入观众关注点
  default_background: "你是一名激情的抖音游戏主播，正在讲解爆款仙侠手游，引导下载、充值、互动"
  danmu_cache:
    max_seconds: 50 # 缓存弹幕最大秒数
    max_nums: 15 # 缓存弹幕最大条数


# 阿里云OSS配置
oss:
  endpoint: "https://oss-cn-beijing.aliyuncs.com"
  bucket: "lucastao"

# 服务配置
server:
  host: "0.0.0.0"
  port: 9080
  log_level: "info"

# Spring Boot 后端地址（Python 开播时调用此地址读取直播间 LLM 配置）
spring_boot:
  base_url: "http://localhost:8080"

# RAG配置
rag:
  enabled: true
  docs_path: "docs/organized_Q&A.txt"
  vector_db_path: "data/chroma_db"
  embedding_model_path: "core/rag/embedding_models/bge-base-zh-v1dot5"
  retrieve_k: 3
  enable_reranker: false
  rerank_top_n: 2
  reranker_model_path: "core/rag/embedding_models/bge-reranker-base"
  trigger_mode: "hybrid"
  rule_keywords:
    - "福利"
    - "东西"
    - "有什么"
    - "有啥"
    - "代金"
    - "代金券"
    - "版本"
    - "无解版"
    - "纯享版"
    - "新区"
    - "哪个区"
    - "怎么玩"
    - "如何进"
    - "进游"
    - "上线"
    - "下载"
    - "职业"
    - "角色"
    - "什么职业"
    - "氪"
    - "钱"
    - "花多少"
    - "微氪"
    - "0氪"
    - "画面"
    - "打击"
    - "特效"
    - "画质"
    - "真实"
    - "真的"
    - "所见即所得"
    - "有没有"
    - "什么游戏"
    - "好玩"
    - "类型"
    - "坐骑"
    - "羽毛"
    - "翅膀"
    - "装备"
    - "怎么搞"
    - "如何弄"
    - "在哪"
    - "多少"
    - "几个"
    - "多久"
    - "能吗"
    - "可以吗"
    - "要吗"
  semantic_threshold: 0.5
  similarity_threshold: 0.5
