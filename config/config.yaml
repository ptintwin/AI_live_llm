# 阿里云百炼配置
dashscope:
  api_key: "配置并读取环境变量DASHSCOPE_API_KEY"
  region: "cn-beijing"

# 文本大模型配置
llm:
  model_name: "qwen-plus-character"
  max_history: 5  # 短期记忆对话轮次
  temperature: 0.85
  stream: true
  cache_control:
    type: "ephemeral"  # 显式临时缓存

# TTS语音配置
tts:
  enabled: true
  model_name: "cosyvoice-v3.5-plus"
  voice_id: "cosyvoice-v3.5-plus-myvoice-4b8964a1dc9a4a07bd6babf1c5db8fe3"
  sample_rate: 16000
  format: "wav"
  speech_rate: 1.2
  pitch_rate: 1.0
  stream: true

# 直播工程配置
live:
  max_cycle_focus: 3  # 前3次循环纳入观众关注点
  default_background: "你是一名激情的抖音游戏主播，正在讲解爆款仙侠手游，引导下载、充值、互动"
  danmu_cache:
    max_seconds: 50 # 缓存弹幕最大秒数
    max_nums: 15 # 缓存弹幕最大条数


# 阿里云OSS配置
oss:
  endpoint: "https://oss-cn-beijing.aliyuncs.com"
  bucket: "lucastao"

# 服务配置
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"

# Spring Boot 后端地址（Python 开播时调用此地址读取直播间 LLM 配置）
spring_boot:
  base_url: "http://localhost:8080"
